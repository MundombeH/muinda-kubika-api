spring.application.name=muinda-kubika

# Database (Render fornece DATABASE_URL no formato postgresql://...)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/muinda_kubika}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:novasenha}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-init-sql=SET SESSION preparation_cache_mode = OFF

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Porta do servidor
server.port=${PORT:8080}
server.address=0.0.0.0

# Upload multipart
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Migrations
spring.flyway.baselineOnMigrate=true
spring.flyway.baseline-version=0
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:dpsns8y1o}
cloudinary.api_key=${CLOUDINARY_API_KEY:659215259758279}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:vwNSNZIbXDoefmOYRZTcZASMhmg}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:leopard.lmq.cloudamqp.com}
spring.rabbitmq.port=${RABBITMQ_PORT:5671}
spring.rabbitmq.username=${RABBITMQ_USERNAME:wvfirmqp}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:N2tMJ1PosU6GEO0fPLTLk8YkOlmzY_nU}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:wvfirmqp}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL_ENABLED:true}
ia.worker.token=${IA_WORKER_TOKEN:change-me}

# JWT
jwt.secret=${JWT_SECRET:trocar-esta-chave-no-ambiente}
jwt.issuer=${JWT_ISSUER:muinda-kubika-api}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

# Actuator + Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
management.prometheus.metrics.export.step=PT15S
